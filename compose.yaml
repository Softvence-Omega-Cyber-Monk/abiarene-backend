services:
  backend:
    container_name: abiarene-backend
    build:
      context: .
      dockerfile: Dockerfile
    image: abiarene-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      RUN_PRISMA_MIGRATIONS: "true"
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    container_name: abiarene-caddy
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
